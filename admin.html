<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幕后管理 · 扮演ChatGPT</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .admin-header {
            background: linear-gradient(145deg, #202123, #1a1b1e);
            padding: 20px 16px;
            border-radius: 24px;
            margin-bottom: 20px;
            border: 1px solid #2c2d33;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .admin-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-title i {
            font-size: 28px;
            color: #19c37d;
            background: rgba(25,195,125,0.15);
            padding: 10px;
            border-radius: 18px;
        }

        .admin-title h1 {
            color: white;
            font-size: 22px;
            font-weight: 600;
        }

        .admin-title p {
            color: #9b9b9b;
            font-size: 13px;
            margin-top: 4px;
        }

        .status-badge {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 30px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #19c37d;
            box-shadow: 0 0 10px #19c37d;
            animation: pulse 2s infinite;
        }

        .status-text {
            color: #ececf1;
            font-weight: 500;
            flex: 1;
        }

        .status-count {
            background: #2c2d33;
            padding: 4px 12px;
            border-radius: 30px;
            color: #19c37d;
            font-weight: 600;
            font-size: 14px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 消息列表 */
        .messages-card {
            background: #202123;
            border-radius: 24px;
            padding: 20px 16px;
            margin-bottom: 20px;
            border: 1px solid #2c2d33;
            flex: 1;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: white;
            font-weight: 600;
        }

        .section-title span {
            background: #2c2d33;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            color: #19c37d;
        }

        .message-item {
            background: #2c2d33;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #19c37d;
        }

        .message-item.user-message {
            border-left-color: #ff9800;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #40414f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-avatar {
            background: #ff9800;
            color: white;
        }

        .assistant-avatar {
            background: #19c37d;
            color: white;
        }

        .message-meta {
            flex: 1;
        }

        .message-sender {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .message-time {
            color: #9b9b9b;
            font-size: 12px;
            display: block;
            margin-top: 2px;
        }

        .message-content {
            color: #ececf1;
            font-size: 15px;
            line-height: 1.5;
            padding-left: 52px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 回复区域 */
        .reply-area {
            background: #202123;
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid #2c2d33;
            margin-top: auto;
            position: sticky;
            bottom: 16px;
        }

        .reply-label {
            color: #9b9b9b;
            font-size: 13px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reply-label i {
            color: #19c37d;
        }

        .reply-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #2c2d33;
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            border: 1px solid #3d3e4a;
        }

        .reply-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 12px 0;
        }

        .reply-input-wrapper input::placeholder {
            color: #6b6e7c;
        }

        .send-reply-btn {
            background: #19c37d;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(25,195,125,0.3);
        }

        .send-reply-btn:active {
            transform: scale(0.95);
        }

        .send-reply-btn i {
            font-size: 20px;
        }

        /* 快捷回复 */
        .quick-replies {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .quick-reply {
            background: #2c2d33;
            border: 1px solid #3d3e4a;
            color: #ececf1;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:active {
            background: #19c37d;
            color: white;
            border-color: #19c37d;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b6e7c;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            color: #6b6e7c;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="admin-title">
            <i class="fa-regular fa-robot"></i>
            <div>
                <h1>幕后控制台 · 扮演AI</h1>
                <p>你在后台回复的消息会出现在朋友的 ChatGPT 上</p>
            </div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            <div class="status-text">等待朋友发消息...</div>
            <div class="status-count" id="pendingCount">0</div>
        </div>
    </div>

    <div class="messages-card">
        <div class="section-title">
            📱 对话记录
            <span id="messageCount">0 条消息</span>
        </div>
        <div id="messageList">
            <div class="empty-state">
                <i class="fa-regular fa-message"></i>
                <p>暂无消息，让朋友先在 ChatGPT 上发消息吧</p>
            </div>
        </div>
    </div>

    <div class="reply-area">
        <div class="reply-label">
            <i class="fa-regular fa-pen-to-square"></i> 
            以 ChatGPT 身份回复朋友
        </div>
        <div class="reply-input-wrapper">
            <input type="text" id="replyInput" placeholder="输入你要假装AI说的话..." autocomplete="off">
            <button class="send-reply-btn" id="sendReplyBtn">
                <i class="fa-regular fa-paper-plane-top"></i>
            </button>
        </div>
        <div class="quick-replies">
            <span class="quick-reply" data-text="你好，有什么可以帮你的？">👋 打招呼</span>
            <span class="quick-reply" data-text="稍等一下，我查查资料">⏳ 稍等</span>
            <span class="quick-reply" data-text="这个我不太确定">🤔 不确定</span>
            <span class="quick-reply" data-text="是的，你说得对">✅ 赞同</span>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'chat_messages';
            
            // DOM 元素
            const messageList = document.getElementById('messageList');
            const replyInput = document.getElementById('replyInput');
            const sendBtn = document.getElementById('sendReplyBtn');
            const pendingCount = document.getElementById('pendingCount');
            const messageCount = document.getElementById('messageCount');

            let messages = [];
            let lastCheck = Date.now();

            // 加载消息
            function loadMessages() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        messages = data.messages || [];
                    } else {
                        // 初始化欢迎消息
                        messages = [{
                            role: 'assistant',
                            content: '你好！我是ChatGPT。有什么可以帮你的吗？',
                            time: Date.now()
                        }];
                        saveToStorage();
                    }
                } catch (e) {
                    console.error('加载失败', e);
                    messages = [];
                }
                renderMessages();
                updateStatus();
            }

            // 保存到 storage
            function saveToStorage() {
                const data = {
                    messages: messages,
                    lastReplyTime: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            // 渲染消息列表
            function renderMessages() {
                if (!messages || messages.length === 0) {
                    messageList.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-regular fa-message"></i>
                            <p>暂无消息，让朋友先在 ChatGPT 上发消息吧</p>
                        </div>
                    `;
                    messageCount.innerText = '0 条消息';
                    return;
                }

                let html = '';
                let pending = 0;

                // 倒序显示（最新的在前）
                [...messages].reverse().forEach(msg => {
                    const isUser = msg.role === 'user';
                    const date = new Date(msg.time || Date.now());
                    const timeStr = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
                    
                    // 统计未回复的用户消息（最后一条是用户发的且还没回复）
                    if (isUser) pending++;

                    html += `
                        <div class="message-item ${isUser ? 'user-message' : ''}">
                            <div class="message-header">
                                <div class="message-avatar ${isUser ? 'user-avatar' : 'assistant-avatar'}">
                                    <i class="fa-regular ${isUser ? 'fa-user' : 'fa-sparkles'}"></i>
                                </div>
                                <div class="message-meta">
                                    <span class="message-sender">${isUser ? '朋友' : 'ChatGPT (你)'}</span>
                                    <span class="message-time">${timeStr}</span>
                                </div>
                            </div>
                            <div class="message-content">
                                ${msg.content}
                            </div>
                        </div>
                    `;
                });

                messageList.innerHTML = html;
                messageCount.innerText = `${messages.length} 条消息`;
                pendingCount.innerText = pending;
                
                // 如果有未回复，状态文字改变
                if (pending > 0) {
                    document.querySelector('.status-text').innerText = `有 ${pending} 条消息待回复`;
                } else {
                    document.querySelector('.status-text').innerText = '等待朋友发消息...';
                }
            }

            // 发送回复（作为AI）
            function sendReply() {
                const reply = replyInput.value.trim();
                if (reply === '') return;

                // 添加AI回复
                messages.push({
                    role: 'assistant',
                    content: reply,
                    time: Date.now()
                });

                saveToStorage();
                renderMessages();

                // 清空输入框
                replyInput.value = '';

                // 震动反馈（移动端）
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }

            // 更新状态（定期检查是否有新消息）
            function updateStatus() {
                // 检查是否有新消息（从朋友那边来的）
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.messages && data.messages.length > messages.length) {
                            messages = data.messages;
                            renderMessages();
                            
                            // 新消息提示
                            if (window.navigator && window.navigator.vibrate) {
                                window.navigator.vibrate([100, 50, 100]);
                            }
                        }
                    }
                } catch (e) {}
            }

            // 快捷回复
            document.querySelectorAll('.quick-reply').forEach(btn => {
                btn.addEventListener('click', () => {
                    replyInput.value = btn.dataset.text;
                    replyInput.focus();
                });
            });

            // 发送按钮
            sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                sendReply();
            });

            // 回车发送
            replyInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendReply();
                }
            });

            // 初始化
            loadMessages();
            
            // 定期检查新消息（每2秒）
            setInterval(updateStatus, 2000);

            // 页面可见时刷新
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadMessages();
                }
            });
        })();
    </script>
</body>
</html>
