<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>admin · 控制端</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #1a1b1e;
            min-height: 100vh;
            padding: 16px;
            color: #ececf1;
        }

        /* 头部 */
        .header {
            background: #202123;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #3d3e4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left i {
            font-size: 28px;
            color: #19c37d;
            background: #2c2d33;
            padding: 12px;
            border-radius: 16px;
        }

        .header-left h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header-left p {
            color: #9b9b9b;
            font-size: 13px;
            margin-top: 4px;
        }

        .status-badge {
            background: #2c2d33;
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #19c37d;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* 消息列表 */
        .messages-container {
            background: #202123;
            border-radius: 20px;
            border: 1px solid #3d3e4a;
            margin-bottom: 20px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        .messages-header {
            padding: 18px 20px;
            border-bottom: 1px solid #3d3e4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2c2d33;
            border-radius: 20px 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .messages-header span {
            color: #19c37d;
            font-weight: 600;
        }

        .message-item {
            padding: 20px;
            border-bottom: 1px solid #2c2d33;
            transition: background 0.2s;
        }

        .message-item.unread {
            background: #2a2b32;
            border-left: 4px solid #19c37d;
        }

        .message-item:hover {
            background: #2c2d33;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .device-tag {
            background: #3d3e4a;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #9b9b9b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .device-tag i {
            color: #19c37d;
            font-size: 10px;
        }

        .message-time {
            color: #6b6e7c;
            font-size: 12px;
        }

        .message-content {
            color: #ececf1;
            font-size: 15px;
            line-height: 1.6;
            padding-left: 35px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 回复区域 */
        .reply-area {
            background: #202123;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3d3e4a;
            position: sticky;
            bottom: 16px;
        }

        .reply-label {
            color: #9b9b9b;
            font-size: 13px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reply-label i {
            color: #19c37d;
        }

        .reply-input-wrapper {
            display: flex;
            gap: 12px;
            background: #2c2d33;
            border-radius: 40px;
            padding: 6px 6px 6px 24px;
            border: 1px solid #3d3e4a;
        }

        .reply-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 14px 0;
        }

        .reply-input-wrapper input::placeholder {
            color: #6b6e7c;
        }

        .send-btn {
            background: #19c37d;
            border: none;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* 快捷短语 */
        .quick-phrases {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .phrase {
            background: #2c2d33;
            border: 1px solid #3d3e4a;
            color: #ececf1;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .phrase:hover {
            background: #19c37d;
            color: white;
            border-color: #19c37d;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b6e7c;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 计数器 */
        .counter {
            background: #19c37d;
            color: #202123;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <i class="fa-regular fa-gauge-high"></i>
            <div>
                <h1>控制端</h1>
                <p>所有设备的消息都会显示在这里</p>
            </div>
        </div>
        <div class="status-badge">
            <div class="dot"></div>
            <span>监听中</span>
            <span class="counter" id="messageCounter">0</span>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="messages-header">
            <span><i class="fa-regular fa-message" style="margin-right: 8px;"></i>消息流</span>
            <span id="unreadCount">0 条未读</span>
        </div>
        <div id="messageList">
            <div class="empty-state">
                <i class="fa-regular fa-radio"></i>
                <p>等待接收消息...</p>
            </div>
        </div>
    </div>

    <div class="reply-area">
        <div class="reply-label">
            <i class="fa-regular fa-reply"></i>
            回复 (将发送给最新消息的设备)
        </div>
        <div class="reply-input-wrapper">
            <input type="text" id="replyInput" placeholder="输入回复内容..." autocomplete="off">
            <button class="send-btn" id="sendReplyBtn">
                <i class="fa-regular fa-arrow-up"></i>
            </button>
        </div>
        <div class="quick-phrases">
            <span class="phrase" data-text="你好，有什么可以帮你？">👋 打招呼</span>
            <span class="phrase" data-text="稍等一下，我看看">⏳ 稍等</span>
            <span class="phrase" data-text="这个我不太确定">🤔 不确定</span>
            <span class="phrase" data-text="是的，你说得对">✅ 赞同</span>
            <span class="phrase" data-text="不好意思，刚看到">🕐 刚看到</span>
        </div>
    </div>

    <script>
        (function() {
            // 和 index.html 使用相同的 storage key
            const STORAGE_KEY = 'chat_messages';
            
            // DOM 元素
            const messageList = document.getElementById('messageList');
            const replyInput = document.getElementById('replyInput');
            const sendBtn = document.getElementById('sendReplyBtn');
            const messageCounter = document.getElementById('messageCounter');
            const unreadCount = document.getElementById('unreadCount');

            // 消息存储
            let messages = [];
            let lastMessageTime = Date.now();

            // 加载消息
            function loadMessages() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.messages && Array.isArray(data.messages)) {
                            messages = data.messages;
                        }
                    }
                } catch (e) {
                    console.log('加载失败', e);
                }
                renderMessages();
            }

            // 保存消息
            function saveMessages() {
                const data = {
                    messages: messages,
                    lastReplyTime: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            // 渲染消息
            function renderMessages() {
                if (!messages || messages.length === 0) {
                    messageList.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-regular fa-radio"></i>
                            <p>等待接收消息...</p>
                        </div>
                    `;
                    messageCounter.innerText = '0';
                    unreadCount.innerText = '0 条未读';
                    return;
                }

                let html = '';
                let unread = 0;

                // 倒序显示（最新的在上面）
                [...messages].reverse().forEach((msg, index) => {
                    const isUser = msg.role === 'user';
                    const date = new Date(msg.time || Date.now());
                    const timeStr = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
                    
                    // 生成设备标识（基于时间戳和内容）
                    const deviceId = msg.deviceId || (msg.time ? msg.time.toString().slice(-6) : '未知');
                    
                    // 检查是否是未读的用户消息（没有回复标记）
                    if (isUser && !msg.replied) {
                        unread++;
                    }

                    html += `
                        <div class="message-item ${isUser && !msg.replied ? 'unread' : ''}" data-index="${messages.length - 1 - index}">
                            <div class="message-header">
                                <span class="device-tag">
                                    <i class="fa-regular fa-mobile"></i>
                                    设备 · ${deviceId}
                                </span>
                                <span class="message-time">
                                    <i class="fa-regular fa-clock" style="margin-right: 4px;"></i>
                                    ${timeStr}
                                </span>
                                ${isUser ? '<span style="color: #19c37d; font-size: 11px;">📱 访客</span>' : '<span style="color: #ffaa5e; font-size: 11px;">🤖 管理员</span>'}
                            </div>
                            <div class="message-content">
                                ${msg.content}
                            </div>
                        </div>
                    `;
                });

                messageList.innerHTML = html;
                messageCounter.innerText = messages.length;
                unreadCount.innerText = unread + ' 条未读';

                // 如果有未读消息，自动滚动到最新
                if (unread > 0) {
                    const container = document.getElementById('messagesContainer');
                    container.scrollTop = 0; // 滚动到顶部看最新消息
                }
            }

            // 发送回复
            function sendReply() {
                const reply = replyInput.value.trim();
                if (reply === '') return;

                // 找到最新的一条用户消息对应的设备
                let targetDevice = null;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].role === 'user') {
                        targetDevice = messages[i].deviceId || messages[i].time;
                        break;
                    }
                }

                // 添加回复
                messages.push({
                    role: 'assistant',
                    content: reply,
                    time: Date.now(),
                    deviceId: targetDevice || ('admin_' + Date.now())
                });

                saveMessages();
                renderMessages();

                // 清空输入
                replyInput.value = '';

                // 震动反馈
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(20);
                }
            }

            // 标记消息为已读（当点击回复时）
            function markMessagesAsRead() {
                let marked = false;
                messages.forEach(msg => {
                    if (msg.role === 'user' && !msg.replied) {
                        msg.replied = true;
                        marked = true;
                    }
                });
                if (marked) {
                    saveMessages();
                    renderMessages();
                }
            }

            // 检查新消息（从 index.html 来）
            function checkForNewMessages() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.messages && data.messages.length > messages.length) {
                            // 发现新消息
                            const oldLength = messages.length;
                            messages = data.messages;
                            
                            // 检查是否有新的用户消息
                            for (let i = oldLength; i < messages.length; i++) {
                                if (messages[i].role === 'user') {
                                    // 新消息到达提示
                                    if (window.navigator && window.navigator.vibrate) {
                                        window.navigator.vibrate([100, 50, 100]);
                                    }
                                    
                                    // 更新标题提示
                                    document.title = '📨 新消息 - 控制端';
                                    setTimeout(() => {
                                        document.title = '控制端';
                                    }, 3000);
                                    break;
                                }
                            }
                            
                            renderMessages();
                        }
                    }
                } catch (e) {
                    console.log('检查新消息失败', e);
                }
            }

            // 快捷短语
            document.querySelectorAll('.phrase').forEach(phrase => {
                phrase.addEventListener('click', () => {
                    replyInput.value = phrase.dataset.text;
                    replyInput.focus();
                });
            });

            // 发送按钮
            sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                markMessagesAsRead(); // 点击发送时标记所有为已读
                sendReply();
            });

            // 回车发送
            replyInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    markMessagesAsRead();
                    sendReply();
                }
            });

            // 点击消息列表（用于标记已读）
            messageList.addEventListener('click', () => {
                markMessagesAsRead();
            });

            // 初始化
            loadMessages();
            
            // 每秒检查新消息
            setInterval(checkForNewMessages, 1000);

            // 页面可见时刷新
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadMessages();
                    markMessagesAsRead();
                }
            });
        })();
    </script>
</body>
</html>
