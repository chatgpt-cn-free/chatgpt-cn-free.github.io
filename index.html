<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT · 对话</title>
    <!-- 字体与图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #343541;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 主容器 - 移动端优化 */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #343541;
            position: relative;
        }

        /* ========= 顶部导航 ========= */
        .nav-header {
            padding: 12px 16px;
            background-color: #202123;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            color: #ececf1;
            font-size: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background-color: rgba(255,255,255,0.05);
        }

        .model-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-right {
            display: flex;
            gap: 16px;
            color: #ececf1;
        }

        .nav-right i {
            font-size: 18px;
        }

        /* ========= 聊天消息区域 ========= */
        .message-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            scroll-behavior: smooth;
        }

        .message-group {
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }

        .message-row {
            display: flex;
            padding: 16px 16px;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .message-row.user-row {
            background-color: #343541;
        }

        .message-row.assistant-row {
            background-color: #444654;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
            font-size: 16px;
        }

        .user-avatar-icon {
            background-color: #6b6e7c;
            color: white;
        }

        .assistant-avatar-icon {
            background-color: #19c37d;
            color: white;
        }

        .message-content {
            flex: 1;
            color: #ececf1;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 14px;
        }

        .message-time {
            font-size: 11px;
            color: #9b9b9b;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
        }

        /* ========= 底部输入区 ========= */
        .input-area {
            padding: 16px 16px 24px 16px;
            background-color: #343541;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            background-color: #40414f;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ececf1;
            font-size: 15px;
            line-height: 1.5;
            max-height: 100px;
            resize: none;
            padding: 8px 0;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder {
            color: #9b9b9b;
        }

        .send-button {
            background-color: #19c37d;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .send-button i {
            font-size: 16px;
        }

        .disclaimer {
            font-size: 11px;
            color: #9b9b9b;
            text-align: center;
            margin-top: 10px;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 0;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #9b9b9b;
            border-radius: 50%;
            animation: bounce 1.5s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 临时消息存储提示 */
        .storage-note {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #ff9800;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 1000;
            backdrop-filter: blur(4px);
            border: 1px solid #ff9800;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <div class="nav-header">
            <div class="nav-left">
                <div class="menu-btn">
                    <i class="fa-regular fa-bars"></i>
                </div>
                <span class="model-name">ChatGPT</span>
            </div>
            <div class="nav-right">
                <i class="fa-regular fa-pen-to-square"></i>
                <i class="fa-regular fa-ellipsis-vertical"></i>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div id="messageContainer" class="message-container">
            <div class="message-group" id="messageGroup">
                <!-- 欢迎消息会通过JS动态加载 -->
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userMessageInput" placeholder="发送消息给 ChatGPT..." rows="1"></textarea>
                <button class="send-button" id="sendUserMsgBtn">
                    <i class="fa-regular fa-arrow-up"></i>
                </button>
            </div>
            <div class="disclaimer">
                中国大陆区免费版 ·延迟较高，无反应时可尝试刷新页面
            </div>
        </div>
    </div>

    <!-- 数据存储提示 -->
    <div class="storage-note" id="storageNote">
        <i class="fa-regular fa-database"></i> 等待新消息...
    </div>

    <script>
        (function() {
            // 使用 localStorage 作为跨页面通信
            const STORAGE_KEY = 'chat_messages';
            const CHECK_INTERVAL = 2000; // 2秒检查一次新消息

            // DOM 元素
            const messageGroup = document.getElementById('messageGroup');
            const userInput = document.getElementById('userMessageInput');
            const sendBtn = document.getElementById('sendUserMsgBtn');
            const messageContainer = document.getElementById('messageContainer');
            const storageNote = document.getElementById('storageNote');

            // 当前消息列表
            let messages = [];

            // 加载已有消息
            function loadMessages() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        messages = data.messages || [];
                        
                        // 更新提示
                        if (data.lastReplyTime) {
                            const timeAgo = Math.floor((Date.now() - data.lastReplyTime) / 1000);
                            if (timeAgo < 60) {
                                storageNote.innerHTML = `<i class="fa-regular fa-clock"></i> AI刚刚回复过`;
                            } else {
                                storageNote.innerHTML = `<i class="fa-regular fa-database"></i> 等待新消息...`;
                            }
                        }
                    }
                } catch (e) {
                    console.log('加载消息失败', e);
                    messages = [];
                }
                renderMessages();
            }

            // 保存消息
            function saveMessage(role, content) {
                const message = {
                    role: role,
                    content: content,
                    time: Date.now()
                };
                messages.push(message);
                
                // 保存到 localStorage
                const data = {
                    messages: messages,
                    lastReplyTime: role === 'assistant' ? Date.now() : null
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                
                renderMessages();
                
                // 滚动到底部
                setTimeout(() => {
                    messageContainer.scrollTop = messageContainer.scrollHeight;
                }, 100);
            }

            // 渲染所有消息
            function renderMessages() {
                messageGroup.innerHTML = '';
                
                if (messages.length === 0) {
                    // 显示默认欢迎消息
                    addWelcomeMessage();
                } else {
                    messages.forEach(msg => {
                        appendMessageToDOM(msg.role, msg.content, msg.time);
                    });
                }
            }

            // 添加欢迎消息
            function addWelcomeMessage() {
                const welcomeMsg = {
                    role: 'assistant',
                    content: '你好！我是ChatGPT。有什么可以帮你的吗？',
                    time: Date.now()
                };
                messages.push(welcomeMsg);
                appendMessageToDOM('assistant', welcomeMsg.content, welcomeMsg.time);
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages: messages }));
            }

            // 将单条消息添加到DOM
            function appendMessageToDOM(role, content, timestamp) {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row ${role === 'user' ? 'user-row' : 'assistant-row'}`;

                // 头像
                const avatarDiv = document.createElement('div');
                avatarDiv.className = `message-avatar ${role === 'user' ? 'user-avatar-icon' : 'assistant-avatar-icon'}`;
                avatarDiv.innerHTML = role === 'user' ? '<i class="fa-regular fa-user"></i>' : '<i class="fa-regular fa-sparkles"></i>';

                // 内容区域
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'message-header';

                const senderSpan = document.createElement('span');
                senderSpan.className = 'message-sender';
                senderSpan.innerText = role === 'user' ? '访客' : 'ChatGPT';

                const timeSpan = document.createElement('span');
                timeSpan.className = 'message-time';
                const date = new Date(timestamp || Date.now());
                timeSpan.innerText = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerText = content;

                headerDiv.appendChild(senderSpan);
                headerDiv.appendChild(timeSpan);
                contentDiv.appendChild(headerDiv);
                contentDiv.appendChild(textDiv);

                rowDiv.appendChild(avatarDiv);
                rowDiv.appendChild(contentDiv);
                messageGroup.appendChild(rowDiv);
            }

            // 发送用户消息
            function sendUserMessage() {
                const msg = userInput.value.trim();
                if (msg === '') return;

                // 保存用户消息
                saveMessage('user', msg);
                userInput.value = '';
                userInput.style.height = 'auto';

                // 更新提示
                storageNote.innerHTML = '<i class="fa-regular fa-hourglass-half"></i> 等待ai回复...';
                storageNote.style.borderColor = '#ff9800';
                storageNote.style.color = '#ff9800';
            }

            // 检查新消息（来自admin的回复）
            function checkForNewMessages() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.messages && data.messages.length > messages.length) {
                            // 发现有新消息
                            const oldCount = messages.length;
                            messages = data.messages;
                            renderMessages();
                            
                            // 如果有新助手消息，更新提示
                            if (data.lastReplyTime) {
                                storageNote.innerHTML = '<i class="fa-regular fa-check-circle"></i> AI已回复！';
                                storageNote.style.borderColor = '#19c37d';
                                storageNote.style.color = '#19c37d';
                                
                                // 3秒后恢复
                                setTimeout(() => {
                                    storageNote.innerHTML = '<i class="fa-regular fa-database"></i> 等待新消息...';
                                    storageNote.style.borderColor = '#ff9800';
                                    storageNote.style.color = '#ff9800';
                                }, 3000);
                            }
                        }
                    }
                } catch (e) {
                    console.log('检查新消息失败', e);
                }
            }

            // 自动调整文本框高度
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // 发送消息
            sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                sendUserMessage();
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendUserMessage();
                }
            });

            // 初始化
            loadMessages();
            
            // 定期检查新消息
            setInterval(checkForNewMessages, CHECK_INTERVAL);

            // 点击菜单按钮无效果（装饰用）
            document.querySelector('.menu-btn').addEventListener('click', (e) => {
                e.preventDefault();
            });

            // 滚动到底部
            setTimeout(() => {
                messageContainer.scrollTop = messageContainer.scrollHeight;
            }, 500);
        })();
    </script>
</body>
</html>
