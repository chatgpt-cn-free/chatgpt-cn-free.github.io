<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT · 对话</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #343541;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #343541;
            position: relative;
        }

        .nav-header {
            padding: 12px 16px;
            background-color: #202123;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            color: #ececf1;
            font-size: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background-color: rgba(255,255,255,0.05);
        }

        .model-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-right {
            display: flex;
            gap: 16px;
            color: #ececf1;
        }

        .nav-right i {
            font-size: 18px;
        }

        .message-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            scroll-behavior: smooth;
        }

        .message-group {
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }

        .message-row {
            display: flex;
            padding: 16px 16px;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .message-row.user-row {
            background-color: #343541;
        }

        .message-row.assistant-row {
            background-color: #444654;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
            font-size: 16px;
        }

        .user-avatar-icon {
            background-color: #6b6e7c;
            color: white;
        }

        .assistant-avatar-icon {
            background-color: #19c37d;
            color: white;
        }

        .message-content {
            flex: 1;
            color: #ececf1;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 14px;
        }

        .message-time {
            font-size: 11px;
            color: #9b9b9b;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
        }

        .input-area {
            padding: 16px 16px 24px 16px;
            background-color: #343541;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            background-color: #40414f;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ececf1;
            font-size: 15px;
            line-height: 1.5;
            max-height: 100px;
            resize: none;
            padding: 8px 0;
            font-family: inherit;
        }

        .input-wrapper textarea::placeholder {
            color: #9b9b9b;
        }

        .send-button {
            background-color: #19c37d;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .send-button i {
            font-size: 16px;
        }

        .disclaimer {
            font-size: 11px;
            color: #9b9b9b;
            text-align: center;
            margin-top: 10px;
        }

        .thinking-row {
            display: flex;
            padding: 16px 16px;
            width: 100%;
            background-color: #444654;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            opacity: 0;
            transform: translateY(-10px);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thinking-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background-color: #19c37d;
            border-radius: 50%;
            opacity: 0.6;
            animation: thinkingBounce 1.4s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }
        .thinking-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes thinkingBounce {
            0%, 80%, 100% { 
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% { 
                transform: scale(1);
                opacity: 1;
            }
        }

        .thinking-text {
            color: #ececf1;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="nav-header">
            <div class="nav-left">
                <div class="menu-btn">
                    <i class="fa-regular fa-bars"></i>
                </div>
                <span class="model-name">ChatGPT</span>
            </div>
            <div class="nav-right">
                <i class="fa-regular fa-pen-to-square"></i>
                <i class="fa-regular fa-ellipsis-vertical"></i>
            </div>
        </div>

        <div id="messageContainer" class="message-container">
            <div class="message-group" id="messageGroup"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userMessageInput" placeholder="发送消息给 ChatGPT..." rows="1"></textarea>
                <button class="send-button" id="sendUserMsgBtn">
                    <i class="fa-regular fa-arrow-up"></i>
                </button>
            </div>
            <div class="disclaimer">
                中国大陆免费版 · 延迟较高，请耐心等待
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== Firebase 配置 =====
            const firebaseConfig = {
                apiKey: "AIzaSyCVVmXYADavtT2VUHlXYE4f2eA6SsC1Llg",
                authDomain: "chatgpt-cn-free.firebaseapp.com",
                projectId: "chatgpt-cn-free",
                storageBucket: "chatgpt-cn-free.firebasestorage.app",
                messagingSenderId: "1064840278974",
                appId: "1:1064840278974:web:f992349f55fb6db030bfef"
            };
            
            // 初始化 Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            
            // 生成设备ID
            let deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('device_id', deviceId);
            }

            // DOM 元素
            const messageGroup = document.getElementById('messageGroup');
            const userInput = document.getElementById('userMessageInput');
            const sendBtn = document.getElementById('sendUserMsgBtn');
            const messageContainer = document.getElementById('messageContainer');

            let isThinking = false;

            // 监听新消息
            db.collection('messages')
                .orderBy('time', 'asc')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            const msg = change.doc.data();
                            
                            // 如果是自己发的消息，不重复显示
                            if (msg.deviceId === deviceId && msg.role === 'user') {
                                return;
                            }
                            
                            // 移除思考动画
                            if (msg.role === 'assistant' && isThinking) {
                                isThinking = false;
                                removeThinkingAnimation();
                            }
                            
                            // 显示消息
                            appendMessageToDOM(msg.role, msg.content, msg.time);
                            
                            setTimeout(() => {
                                messageContainer.scrollTop = messageContainer.scrollHeight;
                            }, 100);
                        }
                    });
                });

            // 发送消息
            async function sendUserMessage() {
                const content = userInput.value.trim();
                if (content === '') return;

                // 显示用户消息
                appendMessageToDOM('user', content, Date.now());
                
                // 保存到 Firestore
                await db.collection('messages').add({
                    role: 'user',
                    content: content,
                    time: Date.now(),
                    deviceId: deviceId
                });

                // 清空输入
                userInput.value = '';
                userInput.style.height = 'auto';

                // 显示思考动画
                isThinking = true;
                addThinkingAnimation();
                
                setTimeout(() => {
                    messageContainer.scrollTop = messageContainer.scrollHeight;
                }, 50);
            }

            // 添加消息到DOM
            function appendMessageToDOM(role, content, timestamp) {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row ${role === 'user' ? 'user-row' : 'assistant-row'}`;

                const avatarDiv = document.createElement('div');
                avatarDiv.className = `message-avatar ${role === 'user' ? 'user-avatar-icon' : 'assistant-avatar-icon'}`;
                avatarDiv.innerHTML = role === 'user' ? '<i class="fa-regular fa-user"></i>' : '<i class="fa-regular fa-sparkles"></i>';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'message-header';

                const senderSpan = document.createElement('span');
                senderSpan.className = 'message-sender';
                senderSpan.innerText = role === 'user' ? '访客' : 'ChatGPT';

                const timeSpan = document.createElement('span');
                timeSpan.className = 'message-time';
                const date = new Date(timestamp || Date.now());
                timeSpan.innerText = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.innerText = content;

                headerDiv.appendChild(senderSpan);
                headerDiv.appendChild(timeSpan);
                contentDiv.appendChild(headerDiv);
                contentDiv.appendChild(textDiv);

                rowDiv.appendChild(avatarDiv);
                rowDiv.appendChild(contentDiv);
                messageGroup.appendChild(rowDiv);
            }

            // 添加思考动画
            function addThinkingAnimation() {
                const thinkingRow = document.createElement('div');
                thinkingRow.className = 'message-row assistant-row thinking-row';
                thinkingRow.id = 'thinkingIndicator';

                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'message-avatar assistant-avatar-icon';
                avatarDiv.innerHTML = '<i class="fa-regular fa-sparkles"></i>';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                const thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'thinking-content';
                
                const dotsDiv = document.createElement('div');
                dotsDiv.className = 'thinking-dots';
                dotsDiv.innerHTML = '<span></span><span></span><span></span>';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'thinking-text';
                textSpan.innerText = 'ChatGPT 正在输入...';

                thinkingDiv.appendChild(dotsDiv);
                thinkingDiv.appendChild(textSpan);
                contentDiv.appendChild(thinkingDiv);

                thinkingRow.appendChild(avatarDiv);
                thinkingRow.appendChild(contentDiv);
                messageGroup.appendChild(thinkingRow);
            }

            // 移除思考动画
            function removeThinkingAnimation() {
                const thinking = document.getElementById('thinkingIndicator');
                if (thinking) {
                    thinking.remove();
                }
            }

            // 事件监听
            sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                sendUserMessage();
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendUserMessage();
                }
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // 初始化
            userInput.focus();
        })();
    </script>
</body>
</html>
