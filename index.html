<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:15px;
background:#020617;
font-size:20px;
font-weight:bold;
}

#chat{
height:80vh;
overflow-y:auto;
padding:20px;
}

.msg{
max-width:60%;
padding:10px 14px;
border-radius:12px;
margin:10px 0;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
}

#inputBox{
position:fixed;
bottom:0;
width:100%;
background:#020617;
padding:10px;
display:flex;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

button{
margin-left:10px;
padding:10px 16px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
}

.thinking{
opacity:0.6;
font-style:italic;
}

</style>
</head>

<body>

<header>AI Chat</header>

<div id="chat"></div>

<div id="inputBox">
<input id="msgInput" placeholder="Send a message">
<button onclick="sendMsg()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"YOURKEY",
authDomain:"YOURDOMAIN",
databaseURL:"YOURDB",
projectId:"YOURID",
storageBucket:"",
messagingSenderId:"",
appId:""
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chat = document.getElementById("chat");

function addMsg(text,type){

let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

window.sendMsg=function(){

let text=document.getElementById("msgInput").value;

if(!text) return;

addMsg(text,"user");

push(ref(db,"messages"),{
role:"user",
text:text
});

document.getElementById("msgInput").value="";

addMsg("AI is thinking...","ai thinking");

}

onChildAdded(ref(db,"messages"),(data)=>{

let msg=data.val();

if(msg.role==="ai"){
addMsg(msg.text,"ai");
}

});

</script>

</body>
</html>
